name: Docker Image CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set variables
      run: |
        RAW_BRANCH=${GITHUB_REF_NAME}
        BRANCH_NAME=$(echo "$RAW_BRANCH" | sed 's/\//__/g')
        SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
        IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/llm-peach

        CACHE_TAG=buildcache-${BRANCH_NAME}

        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
        echo "CACHE_TAG=$CACHE_TAG" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and (maybe) push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' }}

        tags: |
          ${{ env.IMAGE_NAME }}:${{ env.BRANCH_NAME }}-${{ env.SHORT_SHA }}
          ${{ env.IMAGE_NAME }}:${{ env.BRANCH_NAME }}
          ${{ github.ref_name == 'main' && format('{0}:latest', env.IMAGE_NAME) || '' }}

        cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:${{ env.CACHE_TAG }}
        cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
